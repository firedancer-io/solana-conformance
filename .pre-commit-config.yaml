repos:
  # Using this mirror lets us use mypyc-compiled black, which is about 2x faster
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.3.0
    hooks:
      - id: black
        # It is recommended to specify the latest version of Python
        # supported by your project here, or alternatively use
        # pre-commit's default_language_version, see
        # https://pre-commit.com/#top_level-default_language_version
        language_version: python3.11
        exclude: (_pb2\.py$|/flatbuffers/)
  - repo: local
    hooks:
      - id: gen-cmd-docs
        name: Generate command documentation
        language: python
        entry: bash -c 'SOLFUZZ_TARGET= FIREDANCER_TARGET= typer src/test_suite/test_suite.py utils docs --name solana-conformance --output commands.md'
        files: src/test_suite/test_suite.py
        pass_filenames: false
      - id: check-flatbuffers
        name: Check FlatBuffers bindings exist
        language: system
        entry: test -d src/test_suite/flatbuffers/org
        files: \.fbs$
        pass_filenames: false
      - id: check-protobuf-version
        name: Check protobuf generated code matches pinned runtime
        language: system
        entry: bash scripts/check_protobuf_version.sh
        files: (_pb2\.py$|pyproject\.toml$|buf\.gen\.yaml$)
        pass_filenames: false
      - id: check-quick-import
        name: Quick Python import check
        language: system
        entry: bash scripts/check_quick_import.sh
        files: (_pb2\.py$|flatbuffers_utils\.py$|/flatbuffers/)
        pass_filenames: false
